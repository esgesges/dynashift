<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>Dynashift</title>
</head>
<body>
    <header>
        <h1>Dynashift</h1>
    </header>
    <div class="root">
        <div id="left-panel">
            <div>
                <h1>SPORT</h1>
                <p>mode</p>
            </div>
            <div>
                <p>Dynashift is</p>
                <img src="offswitch.png" id="powerImage">
            </div>
        </div>
        <div id="right-panel">
            <table>
                <tr>
                    <th>
                        <div>
                            <p id="speedValue" style="padding-bottom: 60px;">Speed</p>
                            <p id="timeValue">Time</p>
                        </div>
                    </th>
                    <th>
                        <canvas id="graph1"></canvas>

                    </th>
                </tr>
                <tr>
                    <th>
                        <canvas id="graph2"></canvas>

                    </th>
                    <th>
                        <div>
                            <p id="angleValue" style="padding-bottom: 60px;"> angle</p>
                            <p id="pressureValue">pressure</p>
                        </div>
                    </th>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
