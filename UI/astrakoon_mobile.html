<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ASTRAKOON - BLE Reader</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, system-ui, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px;
      background: linear-gradient(180deg, #1a0000 0%, #0a0a0a 100%);
      border-bottom: 1px solid #2a0000;
      text-align: center;
    }

    h1 {
      color: #c00;
      font-size: 22px;
      letter-spacing: 4px;
      font-weight: 900;
    }

    .subtitle {
      color: #888;
      font-size: 11px;
      letter-spacing: 2px;
      margin-top: 2px;
    }

    .status {
      padding: 10px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.3s;
    }

    .status.disconnected {
      background: #2a0000;
      color: #f55;
    }

    .status.connecting {
      background: #2a2a00;
      color: #ff5;
    }

    .status.connected {
      background: #002a00;
      color: #5f5;
    }

    .controls {
      padding: 12px;
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:active {
      transform: scale(0.96);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-connect {
      background: #c00;
      color: #fff;
    }

    .btn-disconnect {
      background: #444;
      color: #fff;
    }

    .btn-clear {
      background: #222;
      color: #aaa;
    }

    .btn-power {
      background: #4a0;
      color: #fff;
    }

    .btn-power.off {
      background: #722;
      color: #fff;
    }

    .power-row {
      padding: 0 12px 12px;
    }

    .power-row button {
      width: 100%;
      padding: 16px;
    }

    .last-event {
      margin: 0 12px;
      padding: 18px;
      background: #1a1a1a;
      border-radius: 8px;
      border-left: 4px solid #c00;
      min-height: 80px;
    }

    .last-event-label {
      font-size: 11px;
      color: #888;
      letter-spacing: 2px;
    }

    .last-event-value {
      font-size: 28px;
      font-weight: 900;
      margin-top: 6px;
      color: #fff;
      font-family: monospace;
      word-break: break-all;
    }

    .log-header {
      padding: 14px 16px 6px;
      font-size: 11px;
      letter-spacing: 2px;
      color: #888;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .count {
      color: #c00;
      font-weight: 700;
    }

    #log {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 12px;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.7;
    }

    .entry {
      padding: 8px 10px;
      margin-bottom: 4px;
      background: #141414;
      border-radius: 4px;
      border-left: 3px solid #333;
      display: flex;
      gap: 10px;
      animation: slideIn 0.2s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .entry.btn {
      border-left-color: #c00;
    }

    .entry.enc {
      border-left-color: #06c;
    }

    .entry.sys {
      border-left-color: #888;
    }

    .entry.warn {
      border-left-color: #fa0;
    }

    .time {
      color: #555;
      flex-shrink: 0;
    }

    .msg {
      color: #ddd;
    }

    .entry.btn .msg {
      color: #f88;
    }

    .entry.enc .msg {
      color: #8af;
    }

    .entry.warn .msg {
      color: #fc6;
    }

    .unsupported {
      margin: 20px;
      padding: 20px;
      background: #2a0000;
      border-radius: 8px;
      color: #f88;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>

<body>

  <header>
    <h1>ASTRAKOON</h1>
    <div class="subtitle">BLE READER</div>
  </header>

  <div id="status" class="status disconnected">DISCONNESSO</div>

  <div class="controls">
    <button id="btnConnect" class="btn-connect">CONNETTI</button>
    <button id="btnDisconnect" class="btn-disconnect" disabled>DISCONNETTI</button>
    <button id="btnClear" class="btn-clear">PULISCI</button>
  </div>

  <div class="power-row">
    <button id="btnPower" class="btn-power" disabled>SPEGNI PULSANTIERA</button>
  </div>

  <div class="last-event">
    <div class="last-event-label">ULTIMO EVENTO</div>
    <div class="last-event-value" id="lastEvent">—</div>
  </div>

  <div class="log-header">
    <span>LOG</span>
    <span>EVENTI: <span class="count" id="count">0</span></span>
  </div>

  <div id="log"></div>

  <script>
    const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const TX_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";
    const RX_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";

    const statusEl = document.getElementById('status');
    const lastEventEl = document.getElementById('lastEvent');
    const logEl = document.getElementById('log');
    const countEl = document.getElementById('count');
    const btnConnect = document.getElementById('btnConnect');
    const btnDisconn = document.getElementById('btnDisconnect');
    const btnClear = document.getElementById('btnClear');
    const btnPower = document.getElementById('btnPower');

    let device = null;
    let characteristic = null;
    let rxCharacteristic = null;
    let isShutdown = false;
    let eventCount = 0;
    let userDisconnected = false;
    let disconnectsSinceConnect = 0;     // conta le disconnessioni dopo l'ultimo CONNETTI
    let reconnectAttempts = 0;
    let reconnectTimer = null;
    const MAX_RECONNECT_ATTEMPTS = 15;
    const RECONNECT_DELAY_MS = 1500;

    if (!navigator.bluetooth) {
      document.body.innerHTML = `
    <header><h1>ASTRAKOON</h1><div class="subtitle">BLE READER</div></header>
    <div class="unsupported">
      <strong>Browser non supportato</strong><br><br>
      Usa <b>Chrome</b> o <b>Edge</b> su Android.<br>
      Su iPhone non funziona (limite di Apple).
    </div>`;
    }

    function setStatus(state, text) {
      statusEl.className = 'status ' + state;
      statusEl.textContent = text;
      updatePowerButton();
    }
    function timestamp() {
      const d = new Date();
      return d.toTimeString().slice(0, 8) + '.' + String(d.getMilliseconds()).padStart(3, '0').slice(0, 2);
    }
    function addLogEntry(msg, type = 'sys') {
      const e = document.createElement('div');
      e.className = 'entry ' + type;
      e.innerHTML = `<span class="time">${timestamp()}</span><span class="msg">${msg}</span>`;
      logEl.insertBefore(e, logEl.firstChild);
      while (logEl.children.length > 200) logEl.removeChild(logEl.lastChild);
      eventCount++;
      countEl.textContent = eventCount;
    }

    function handleNotification(event) {
      const value = new TextDecoder().decode(event.target.value);
      for (const line of value.split('\n')) {
        const msg = line.trim();
        if (!msg) continue;
        lastEventEl.textContent = msg;
        let type = 'sys';
        if (msg.startsWith('BTN:')) type = 'btn';
        else if (msg.startsWith('ENC:')) type = 'enc';
        else if (msg.startsWith('STATE:')) {
          type = 'sys';
          if (msg === 'STATE:SHUTDOWN') { isShutdown = true; updatePowerButton(); }
          if (msg === 'STATE:AWAKE') { isShutdown = false; updatePowerButton(); }
        }
        addLogEntry(msg, type);
        if (navigator.vibrate && type === 'btn') navigator.vibrate(15);
      }
    }

    // Pipeline di attach (vale sia per prima connessione che riconnessione)
    async function attachToDevice(dev) {
      device = dev;
      device.removeEventListener('gattserverdisconnected', onDisconnected);
      device.addEventListener('gattserverdisconnected', onDisconnected);
      const server = await device.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);
      characteristic = await service.getCharacteristic(TX_UUID);
      try {
        rxCharacteristic = await service.getCharacteristic(RX_UUID);
      } catch (e) {
        rxCharacteristic = null;
      }
      await characteristic.startNotifications();
      characteristic.addEventListener('characteristicvaluechanged', handleNotification);
    }

    async function connect() {
      try {
        userDisconnected = false;
        disconnectsSinceConnect = 0;      // reset contatore
        reconnectAttempts = 0;
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
        setStatus('connecting', 'RICERCA...');
        btnConnect.disabled = true;
        const dev = await navigator.bluetooth.requestDevice({
          filters: [{ name: 'ASTRAKOON' }],
          optionalServices: [SERVICE_UUID]
        });
        setStatus('connecting', 'CONNESSIONE...');
        await attachToDevice(dev);
        setStatus('connected', 'CONNESSO');
        btnDisconn.disabled = false;
        addLogEntry('Connesso a ' + device.name);
      } catch (err) {
        setStatus('disconnected', 'DISCONNESSO');
        btnConnect.disabled = false;
        if (err.name !== 'NotFoundError') addLogEntry('Errore: ' + err.message, 'warn');
      }
    }

    // Auto-riconnessione: la pulsantiera disconnette per chiedere l'autorizzazione,
    // poi riavvia l'advertising. Riproviamo finche' ASTRAKOON ci accetta.
    async function tryReconnect() {
      if (userDisconnected || !device) return;
      if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
        setStatus('disconnected', 'DISCONNESSO');
        btnConnect.disabled = false;
        btnDisconn.disabled = true;
        addLogEntry('Riconnessione fallita, premi CONNETTI', 'warn');
        return;
      }
      reconnectAttempts++;
      setStatus('connecting', `RICONNESSIONE ${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS}`);
      try {
        await attachToDevice(device);
        setStatus('connected', 'CONNESSO');
        btnDisconn.disabled = false;
        btnConnect.disabled = true;
        reconnectAttempts = 0;
        addLogEntry('Riconnesso');
      } catch (err) {
        reconnectTimer = setTimeout(tryReconnect, RECONNECT_DELAY_MS);
      }
    }

    function onDisconnected() {
      if (userDisconnected) {
        setStatus('disconnected', 'DISCONNESSO');
        btnConnect.disabled = false;
        btnDisconn.disabled = true;
        addLogEntry('Disconnesso');
        return;
      }
      disconnectsSinceConnect++;
      // Auto-reconnect SOLO alla prima disconnessione (quella per l'autorizzazione).
      // Dalla seconda in poi: manuale.
      if (disconnectsSinceConnect === 1) {
        addLogEntry('Disconnesso, attendo autorizzazione...', 'warn');
        setStatus('connecting', 'IN ATTESA...');
        if (reconnectTimer) clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(tryReconnect, RECONNECT_DELAY_MS);
      } else {
        setStatus('disconnected', 'DISCONNESSO');
        btnConnect.disabled = false;
        btnDisconn.disabled = true;
        addLogEntry('Disconnesso, premi CONNETTI', 'warn');
      }
    }

    async function disconnect() {
      userDisconnected = true;
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      if (device && device.gatt.connected) await device.gatt.disconnect();
    }

    async function sendCommand(cmd) {
      if (!rxCharacteristic) {
        addLogEntry('Comando non disponibile (no RX)', 'warn');
        return;
      }
      try {
        const data = new TextEncoder().encode(cmd);
        await rxCharacteristic.writeValue(data);
        addLogEntry('Inviato: ' + cmd);
      } catch (err) {
        addLogEntry('Errore invio: ' + err.message, 'warn');
      }
    }

    function updatePowerButton() {
      const connected = device && device.gatt && device.gatt.connected;
      btnPower.disabled = !connected;
      if (isShutdown) {
        btnPower.textContent = 'ACCENDI PULSANTIERA';
        btnPower.classList.add('off');
      } else {
        btnPower.textContent = 'SPEGNI PULSANTIERA';
        btnPower.classList.remove('off');
      }
    }

    btnConnect.addEventListener('click', connect);
    btnDisconn.addEventListener('click', disconnect);
    btnPower.addEventListener('click', async () => {
      if (isShutdown) {
        await sendCommand('WAKE_UP');
      } else {
        await sendCommand('SHUT_DOWN');
      }
    });
    btnClear.addEventListener('click', () => {
      logEl.innerHTML = '';
      eventCount = 0;
      countEl.textContent = '0';
      lastEventEl.textContent = '—';
    });
  </script>

</body>

</html>
