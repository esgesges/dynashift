<!DOCTYPE html>

<head>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="root">
        <div id="left-panel">
            <div id="choices-container">
                <input type="range" min="0" max="100" step="50" value="50" class="slider" id="myRange"
                    orient="vertical">
                <div id="modes">
                    <h1 style="margin: 0px;"> - TURBO</h1>
                    <h1 style="margin: 0px;"> - DEFAULT</h1>
                    <h1 style="margin: 0px;"> - ECO</h1>
                </div>
            </div>
            <div id="power-button">
                <img src="power-button.png" alt="Power">
                <h1>Dynashift is ready</h1>
            </div>
        </div>
        <div id="right-panel">
            <div id="right-panel-content">
                <div class="info-block">
                    <div class="icon-placeholder"></div>
                    <h1>speed -</h1>
                </div>
                <div class="info-block">
                    <div class="icon-placeholder"></div>
                    <h1>angle -</h1>
                </div>
                <div class="info-block">
                    <div class="icon-placeholder"></div>
                    <h1>pressure -</h1>
                </div>
            </div>
        </div>
    </div>
</body>
